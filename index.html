<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="robots" content="noindex, nofollow"> <!-- 検索エンジンに登録させない設定 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福岡県言語聴覚士会 学生サポーター名刺作成</title>
    <style>
        /* 全体スタイル */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 20px;
            color: #1a365d;
            border-bottom: 2px solid #3182ce;
            padding-bottom: 10px;
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            background-color: #3182ce;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #2b6cb0;
        }

        /* プレビューエリア */
        .preview-title {
            margin-top: 30px;
            font-weight: bold;
            color: #4a5568;
        }

        /* A4印刷用レイアウト（画面表示・印刷共通） */
        #print-area {
            display: grid;
            grid-template-columns: repeat(2, 91mm);
            grid-template-rows: repeat(6, 55mm);
            gap: 0;
            width: 182mm;
            height: 330mm;
            margin: 20px auto;
            background: white;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        /* 名刺1枚のデザイン */
        .card {
            width: 91mm;
            height: 55mm;
            box-sizing: border-box;
            border: 1px dashed #e2e8f0; /* カット用の薄い境界線 */
            padding: 12mm 8mm 8mm 8mm;
            position: relative;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* スタイリッシュ・真面目さを引き立てる縦のアクセントライン（カラー・白黒双方対応の濃紺/黒） */
        .card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background-color: #1a365d;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .auth-text {
            font-size: 7pt;
            color: #4a5568;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* ロゴ部分 */
        .logo-placeholder {
            height: 25px; /* 高さを揃えてスタイリッシュに */
            width: auto;
            max-width: 60px;
            opacity: 0.9;
            object-fit: contain;
        }

        .card-body {
            margin-top: 5px;
        }

        .school-name {
            font-size: 8pt;
            color: #718096;
            margin-bottom: 2px;
        }

        .student-title {
            font-size: 7pt;
            color: #4a5568;
            margin-bottom: 4px;
        }

        .name {
            font-size: 15pt;
            font-weight: bold;
            color: #111;
            letter-spacing: 1px;
        }

        .card-footer {
            border-top: 1px solid #e2e8f0;
            padding-top: 6px;
            font-size: 7.5pt;
            color: #4a5568;
            text-align: right;
        }

        /* 印刷用CSS設定 */
        @media print {
            body {
                background: none;
                padding: 0;
            }
            .container, h1, .form-group, button, .preview-title {
                display: none; /* 入力フォームなどを印刷時に非表示にする */
            }
            #print-area {
                border: none;
                margin: 0;
            }
            .card {
                border: 1px solid #ddd; /* 印刷時の裁断目安線 */
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>福岡県言語聴覚士会 学生サポーター名刺ジェネレーター</h1>
    
    <div class="form-group">
        <label for="input-school">学校名</label>
        <select id="input-school" oninput="updateCards()">
            <option value="麻生リハビリテーション大学校">麻生リハビリテーション大学校</option>
            <option value="柳川リハビリテーション学院">柳川リハビリテーション学院</option>
            <option value="福岡国際医療福祉大学">福岡国際医療福祉大学</option>
        </select>
    </div>

    <div class="form-group">
        <label for="input-name">氏名</label>
        <input type="text" id="input-name" placeholder="言語 太郎" value="言語 太郎" oninput="updateCards()">
    </div>

    <div class="form-group">
        <label for="input-email">メールアドレス</label>
        <input type="email" id="input-email" placeholder="rehab-student@example.com" value="rehab-student@example.com" oninput="updateCards()">
    </div>

    <button onclick="window.print()">名刺を印刷する (A4・12枚)</button>
    
    <div class="preview-title">【印刷イメージプレビュー】</div>
</div>

<!-- A4サイズの中に名刺12枚を配置するエリア -->
<div id="print-area">
    <!-- JavaScriptでここに12枚の名刺を自動生成します -->
</div>

<script>
    // ロゴ画像のHTML（logo.pngが読み込めない場合は、自動的に仮のマークを表示します）
    const logoHtml = `
        <img src="logo.png" class="logo-placeholder" alt="県士会ロゴ" 
             onerror="this.onerror=null; this.outerHTML='<svg class=\\'logo-placeholder\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'#1a365d\\' stroke-width=\\'2\\'><path d=\\'M12 2a10 10 0 1 0 10 10H12V2z\\'/><path d=\\'M12 2a10 10 0 0 1 10 10h-10V2z\\' opacity=\\'0.5\\'/></svg>';">
    `;

    function generateCards() {
        const printArea = document.getElementById('print-area');
        printArea.innerHTML = '';

        const school = document.getElementById('input-school').value;
        const name = document.getElementById('input-name').value;
        const email = document.getElementById('input-email').value;

        // A4 1枚に収めるため12個のカードを生成
        for (let i = 0; i < 12; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header">
                    <span class="auth-text">福岡県言語聴覚士会 公認サポーター</span>
                    ${logoHtml}
                </div>
                <div class="card-body">
                    <div class="school-name">${school}</div>
                    <div class="student-title">学生サポーター</div>
                    <div class="name">${name}</div>
                </div>
                <div class="card-footer">
                    Email: ${email}
                </div>
            `;
            printArea.appendChild(card);
        }
    }

    // 入力値が変更されたらリアルタイムにプレビューを更新
    function updateCards() {
        generateCards();
    }

    // 初回起動時
    generateCards();
</script>

</body>
</html>
